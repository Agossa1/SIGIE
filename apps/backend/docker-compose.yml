
services:
  # Database PostgreSQL
  postgres:
    image: postgis/postgis:15-3.4
    container_name: hsetera_postgres
    platform: linux/amd64
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-Hse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-19991}
      POSTGRES_DB: ${DB_NAME:-hsetera}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - hsetera_postgres_data:/var/lib/postgresql/data
      # Mount the schema for automatic initialization
      - ./src/infra/migrations/01_schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - environnement_network

  # Cache Redis
  redis:
    image: redis:7-alpine
    container_name: hsetera_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - environnement_network

networks:
  environnement_network:
    driver: bridge

volumes:
  hsetera_postgres_data:
  redis_data:
